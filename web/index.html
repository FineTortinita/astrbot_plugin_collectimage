<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片收集管理器</title>
    <link rel="stylesheet" href="/web/style.css">
</head>
<body>
    <div id="app">
        <!-- 登录页 -->
        <div id="login-page" class="page">
            <div class="login-box">
                <h1>图片收集管理器</h1>
                <form id="login-form">
                    <input type="password" id="password" placeholder="请输入密码" required>
                    <button type="submit">登录</button>
                </form>
                <p id="login-error" class="error"></p>
            </div>
        </div>

        <!-- 主页面 -->
        <div id="main-page" class="page hidden">
            <header>
                <h1>图片收集管理器</h1>
                <div class="header-actions">
                    <span id="image-count">共 0 张图片</span>
                    <button id="logout-btn" class="btn-secondary">退出登录</button>
                </div>
            </header>

            <nav class="tab-nav">
                <button class="tab-btn active" data-tab="images">图片管理</button>
                <button class="tab-btn" data-tab="aliases">别名管理</button>
            </nav>

            <div id="tab-images" class="tab-content">
                <div class="search-bar">
                    <input type="text" id="search-tag" placeholder="搜索标签...">
                    <input type="text" id="search-character" placeholder="搜索角色...">
                    <input type="text" id="search-description" placeholder="搜索描述...">
                    <button id="search-btn">搜索</button>
                    <button id="clear-search-btn" class="btn-secondary">清除</button>
                </div>

                <div id="image-grid" class="image-grid"></div>
                
                <div class="pagination">
                    <button id="prev-page" class="btn-secondary">上一页</button>
                    <span id="page-info">第 1 页</span>
                    <button id="next-page" class="btn-secondary">下一页</button>
                </div>
            </div>

            <div id="tab-aliases" class="tab-content hidden">
                <div class="alias-toolbar">
                    <input type="text" id="search-alias" placeholder="搜索别名...">
                    <select id="alias-type-filter">
                        <option value="">全部类型</option>
                        <option value="character">角色</option>
                        <option value="work">作品</option>
                    </select>
                    <select id="alias-page-size">
                        <option value="25">25条/页</option>
                        <option value="50">50条/页</option>
                        <option value="100">100条/页</option>
                    </select>
                    <button id="search-alias-btn" class="btn-primary">搜索</button>
                    <button id="import-alias-btn" class="btn-warning">从文件导入</button>
                    <button id="add-alias-btn" class="btn-primary">添加别名</button>
                </div>
                <div id="import-progress" class="import-progress hidden">
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill"></div>
                    </div>
                    <div class="progress-info">
                        <span id="progress-text">导入中...</span>
                        <button id="stop-import-btn" class="btn-danger btn-sm">停止</button>
                    </div>
                </div>
                <div id="alias-list" class="alias-list"></div>
                <div class="alias-pagination">
                    <button id="alias-prev-page" class="btn-secondary">上一页</button>
                    <span id="alias-page-info">第 1 页</span>
                    <button id="alias-next-page" class="btn-secondary">下一页</button>
                </div>
            </div>
        </div>

        <!-- 图片详情弹窗 -->
        <div id="detail-modal" class="modal hidden">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div class="modal-body">
                    <div class="modal-image">
                        <img id="detail-image" src="" alt="">
                    </div>
                    <div class="modal-info">
                        <h2>图片详情</h2>
                        <div class="info-item">
                            <label>文件名:</label>
                            <span id="detail-filename"></span>
                        </div>
                        <div class="info-item">
                            <label>群号:</label>
                            <span id="detail-group"></span>
                        </div>
                        <div class="info-item">
                            <label>发送者:</label>
                            <span id="detail-sender"></span>
                        </div>
                        <div class="info-item">
                            <label>时间:</label>
                            <span id="detail-time"></span>
                        </div>
                        <div class="info-item">
                            <label>角色:</label>
                            <div id="character-editor" class="character-editor">
                                <div class="character-list"></div>
                                <button type="button" id="add-character-btn" class="btn-small">+ 添加角色</button>
                            </div>
                        </div>
                        <div class="info-item">
                            <label>描述:</label>
                            <input type="text" id="detail-description" placeholder="图片描述">
                        </div>
                        <div class="info-item">
                            <label>标签:</label>
                            <div id="detail-tags" class="tags-container"></div>
                        </div>
                        <div class="modal-actions">
                            <button id="save-detail-btn" class="btn-primary">保存</button>
                            <button id="reanalyze-btn" class="btn-warning">AI重新分析</button>
                            <button id="recognize-btn" class="btn-info">识别角色</button>
                            <button id="delete-btn" class="btn-danger">删除</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 添加别名弹窗 -->
        <div id="alias-modal" class="modal hidden">
            <div class="modal-content modal-small">
                <span class="close-alias">&times;</span>
                <h2>添加别名</h2>
                <form id="add-alias-form">
                    <div class="form-group">
                        <label>类型:</label>
                        <select id="alias-type">
                            <option value="character">角色</option>
                            <option value="work">作品</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>原名(日文/英文):</label>
                        <input type="text" id="alias-original" placeholder="例如: 鳴瀬白羽" required>
                    </div>
                    <div class="form-group">
                        <label>别名(中文/简体):</label>
                        <input type="text" id="alias-name" placeholder="例如: 鸣濑白羽" required>
                    </div>
                    <div class="modal-actions">
                        <button type="submit" class="btn-primary">添加</button>
                        <button type="button" id="cancel-alias-btn" class="btn-secondary">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/web/app.js"></script>
</body>
</html>
