<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片收集管理器</title>
    <link rel="stylesheet" href="/web/style.css">
</head>
<body>
    <div id="app">
        <!-- 登录页 -->
        <div id="login-page" class="page">
            <div class="login-box">
                <h1>图片收集管理器</h1>
                <form id="login-form">
                    <input type="password" id="password" placeholder="请输入密码" required>
                    <button type="submit">登录</button>
                </form>
                <p id="login-error" class="error"></p>
            </div>
        </div>

        <!-- 主页面 -->
        <div id="main-page" class="page hidden">
            <header>
                <h1>图片收集管理器</h1>
                <div class="header-actions">
                    <span id="image-count">共 0 张图片</span>
                    <button id="logout-btn" class="btn-secondary">退出登录</button>
                </div>
            </header>

            <div class="search-bar">
                <input type="text" id="search-tag" placeholder="搜索标签...">
                <input type="text" id="search-character" placeholder="搜索角色...">
                <input type="text" id="search-description" placeholder="搜索描述...">
                <button id="search-btn">搜索</button>
                <button id="clear-search-btn" class="btn-secondary">清除</button>
            </div>

            <div id="image-grid" class="image-grid"></div>
            
            <div class="pagination">
                <button id="prev-page" class="btn-secondary">上一页</button>
                <span id="page-info">第 1 页</span>
                <button id="next-page" class="btn-secondary">下一页</button>
            </div>
        </div>

        <!-- 图片详情弹窗 -->
        <div id="detail-modal" class="modal hidden">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div class="modal-body">
                    <div class="modal-image">
                        <img id="detail-image" src="" alt="">
                    </div>
                    <div class="modal-info">
                        <h2>图片详情</h2>
                        <div class="info-item">
                            <label>文件名:</label>
                            <span id="detail-filename"></span>
                        </div>
                        <div class="info-item">
                            <label>群号:</label>
                            <span id="detail-group"></span>
                        </div>
                        <div class="info-item">
                            <label>发送者:</label>
                            <span id="detail-sender"></span>
                        </div>
                        <div class="info-item">
                            <label>时间:</label>
                            <span id="detail-time"></span>
                        </div>
                        <div class="info-item">
                            <label>角色:</label>
                            <input type="text" id="detail-character" placeholder="角色名">
                        </div>
                        <div class="info-item">
                            <label>描述:</label>
                            <input type="text" id="detail-description" placeholder="图片描述">
                        </div>
                        <div class="info-item">
                            <label>标签:</label>
                            <div id="detail-tags" class="tags-container"></div>
                        </div>
                        <div class="modal-actions">
                            <button id="save-detail-btn" class="btn-primary">保存</button>
                            <button id="reanalyze-btn" class="btn-warning">AI重新分析</button>
                            <button id="recognize-btn" class="btn-info">识别角色</button>
                            <button id="delete-btn" class="btn-danger">删除</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/web/app.js"></script>
</body>
</html>
